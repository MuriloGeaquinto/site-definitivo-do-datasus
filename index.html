function processarDados() {
    const parsed = Papa.parse(csvData, { header: true, skipEmptyLines: true });
    const dados = parsed.data;
    const tbody = document.querySelector('#tabela-dados tbody');
    let missingCount = 0;
    const municipiosNoArquivo = dados.map(d => d.municipio.trim());

    // 1. Limpar tabela
    tbody.innerHTML = "";

    // 2. Renderizar e checar dados faltantes por linha
    dados.forEach(row => {
        let tr = document.createElement('tr');
        let htmlRow = "";
        
        Object.values(row).forEach(val => {
            const isMissing = val === "" || val === undefined || val === null;
            if (isMissing) missingCount++;
            htmlRow += `<td class="${isMissing ? 'missing' : ''}">${isMissing ? 'FALTANDO' : val}</td>`;
        });

        tr.innerHTML = htmlRow;
        tbody.appendChild(tr);
    });

    // 3. Validação dos 78 municípios
    const faltantesES = listaMunicipiosES.filter(m => !municipiosNoArquivo.includes(m));
    const divValidacao = document.getElementById('validacao');
    
    if (faltantesES.length === 0 && municipiosNoArquivo.length >= 78) {
        divValidacao.innerHTML = `<span class="status-ok">✔ Todos os 78 municípios do ES estão presentes.</span>`;
        divValidacao.className = "card"; 
    } else {
        divValidacao.innerHTML = `
            <span class="status-error">✖ Atenção: Faltam ${faltantesES.length} municípios do ES no arquivo!</span><br>
            <small>Exemplos faltantes: ${faltantesES.slice(0, 5).join(', ')}...</small>
        `;
    }

    // 4. Atualizar contadores
    document.getElementById('count-municipios').innerText = municipiosNoArquivo.length;
    document.getElementById('count-missing').innerText = missingCount;
}

// Executar ao carregar
window.onload = processarDados;
